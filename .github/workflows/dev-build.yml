name: Dev Build

on:
  push:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.h"
      - "**.qml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "packaging/**"
      - "resources/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: "6.11.1"
  QT_MODULES: qtserialbus qtserialport qtgraphs qttasktree qtquick3d qtshadertools
  # PyPI aqtinstall 3.3.0 lacks Qt 6.11 Windows layout (miurahr/aqtinstall#1000)
  AQT_SOURCE: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b

permissions:
  contents: read

jobs:
  build-deb:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: meta
        run: |
          VERSION=$(grep -E '^project\(central_logger VERSION' CMakeLists.txt \
            | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libgl1-mesa-dev libfontconfig1-dev libdbus-1-dev libxkbcommon-dev \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            libwayland-dev libwayland-client0 \
            patchelf dpkg-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.workspace }}
          install-deps: false
          aqtsource: ${{ env.AQT_SOURCE }}
          cache: true
          cache-key-prefix: qt611-linux

      - name: Build .deb
        run: |
          chmod +x packaging/linux/cpack_deb.sh
          packaging/linux/cpack_deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: central-logger-dev-deb-${{ github.sha }}
          path: dist/central-logger-app_${{ steps.meta.outputs.version }}_amd64.deb
          if-no-files-found: error
          retention-days: 7

  build-exe:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - name: Exclude Windows Store Python stub from PATH
        shell: pwsh
        run: |
          $filtered = ($env:PATH -split ';' | Where-Object { $_ -and $_ -notmatch 'WindowsApps' })
          echo "PATH=$($filtered -join ';')" >> $env:GITHUB_ENV

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: latest

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: ${{ env.QT_MODULES }}
          tools: tools_mingw1310 tools_ifw
          dir: ${{ runner.workspace }}
          install-deps: false
          add-tools-to-path: true
          aqtsource: ${{ env.AQT_SOURCE }}
          cache: true
          cache-key-prefix: qt611-win

      - name: Configure and build Release
        shell: pwsh
        run: |
          cmake -S . -B build-dev-win -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          cmake --build build-dev-win -j

      - name: Build QTIFW installer
        shell: pwsh
        env:
          CL_PROJECT_ROOT: ${{ github.workspace }}
          CL_QT_DIR: ${{ env.QT_ROOT_DIR }}
          CL_BUILD_DIR: ${{ github.workspace }}/build-dev-win
          CL_MINGW_DIR: ${{ env.IQTA_TOOLS }}/mingw1310_64
        run: ${{ github.workspace }}/packaging/windows/build_installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: central-logger-dev-exe-${{ github.sha }}
          path: packaging/windows/installer_build/CentralLoggerSetup.exe
          if-no-files-found: error
          retention-days: 7
