name: Dev Build

on:
  push:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.h"
      - "**.qml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "packaging/**"
      - "resources/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: "6.11.1"
  # qttools is not an aqt module — use tools: on Windows only
  QT_MODULES: qtserialbus qtserialport qtgraphs qttasktree qtquick3d qtshadertools

permissions:
  contents: read

jobs:
  build-deb:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: meta
        run: |
          VERSION=$(grep -E '^project\(central_logger VERSION' CMakeLists.txt \
            | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libgl1-mesa-dev libfontconfig1-dev libdbus-1-dev libxkbcommon-dev \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            patchelf dpkg-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.workspace }}
          install-deps: false
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@master
          cache: true
          cache-key-prefix: qt611-linux-aqtmaster-v1

      - name: Build .deb
        run: |
          chmod +x packaging/linux/cpack_deb.sh
          packaging/linux/cpack_deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: central-logger-dev-deb-${{ github.sha }}
          path: dist/central-logger-app_${{ steps.meta.outputs.version }}_amd64.deb
          if-no-files-found: error
          retention-days: 7

  build-exe:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Exclude Windows Store Python stub from PATH
        shell: pwsh
        run: |
          $filtered = ($env:PATH -split ';' | Where-Object { $_ -and $_ -notmatch 'WindowsApps' })
          echo "PATH=$($filtered -join ';')" >> $env:GITHUB_ENV

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: latest

      - name: Read version
        id: meta
        shell: bash
        run: |
          VERSION=$(grep -E '^project\(central_logger VERSION' CMakeLists.txt \
            | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # aqtinstall 3.3.0 (PyPI) misses Qt 6.11 Windows repo layout — miurahr/aqtinstall#1000 on master
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          # Qt 6.11 repo: win64_mingw → qt6_611x_mingw; win64_mingw1310_64 maps to no extension (aqt #959)
          arch: win64_mingw
          modules: ${{ env.QT_MODULES }}
          tools: tools_mingw1310 tools_ifw
          dir: ${{ runner.workspace }}
          install-deps: false
          add-tools-to-path: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          cache: true
          cache-key-prefix: qt611-win-mingw-v1

      - name: Verify Qt environment
        shell: pwsh
        run: |
          Write-Host "QT_ROOT_DIR=$env:QT_ROOT_DIR"
          Write-Host "IQTA_TOOLS=$env:IQTA_TOOLS"
          if (-not $env:QT_ROOT_DIR) { throw "QT_ROOT_DIR not set" }
          if (-not (Test-Path "$env:QT_ROOT_DIR\lib\cmake\Qt6Graphs\Qt6GraphsConfig.cmake")) {
            throw "Qt6Graphs missing under $env:QT_ROOT_DIR"
          }
          & "$env:QT_ROOT_DIR\bin\qmake.exe" -query QT_VERSION

      - name: Configure and build Release
        shell: pwsh
        run: |
          cmake --version
          cmake -S . -B build-dev-win -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          cmake --build build-dev-win -j

      - name: Build QTIFW installer
        shell: pwsh
        env:
          CL_PROJECT_ROOT: ${{ github.workspace }}
          CL_QT_DIR: ${{ env.QT_ROOT_DIR }}
          CL_BUILD_DIR: ${{ github.workspace }}/build-dev-win
          CL_MINGW_DIR: ${{ env.IQTA_TOOLS }}/mingw1310_64
        run: |
          $ifw = Get-ChildItem -Path $env:IQTA_TOOLS -Filter binarycreator.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ifw) { throw "binarycreator.exe not found under IQTA_TOOLS=$($env:IQTA_TOOLS)" }
          $env:CL_IFW_DIR = $ifw.Directory.Parent.Parent.FullName
          & "${{ github.workspace }}/packaging/windows/build_installer.ps1"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: central-logger-dev-exe-${{ github.sha }}
          path: packaging/windows/installer_build/CentralLoggerSetup.exe
          if-no-files-found: error
          retention-days: 7
