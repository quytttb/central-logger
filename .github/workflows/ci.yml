name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: "6.11.1"
  QT_MODULES: qtserialbus qtserialport qtgraphs qttasktree qtquick3d qtshadertools
  AQT_SOURCE: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt / OpenGL system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libgl1-mesa-dev libfontconfig1-dev libdbus-1-dev \
            libxkbcommon-dev libegl1 libgl1 libglib2.0-0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.workspace }}
          install-deps: false
          aqtsource: ${{ env.AQT_SOURCE }}
          cache: true
          cache-key-prefix: qt611-linux

      - name: Configure
        run: |
          PRE="${QT_ROOT_DIR}"
          if [ ! -f "${PRE}/lib/cmake/Qt6Graphs/Qt6GraphsConfig.cmake" ]; then
            PRE="$(dirname "${PRE}")/gcc_64"
          fi
          export PATH="${PRE}/bin:${PATH}"
          "${PRE}/bin/qmake6" -query QT_VERSION
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="${PRE}" \
            -DQt6_DIR="${PRE}/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
