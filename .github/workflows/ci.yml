name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: "6.11.1"
  # qtsvg in Qt base; SerialBusâ†’serialport; Graphsâ†’quick3d; Qmlâ†’tasktree (aqt list-qt --modules 6.11.1 linux_gcc_64)
  QT_MODULES: qtserialbus qtserialport qtgraphs qttasktree qtquick3d qtshadertools

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Qt 6.11 CMake package caps at 3.21; ubuntu-latest ships 3.28 â€” use CMake 4.x (matches dev).
      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.2.0"

      - name: Install Qt / OpenGL system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            patchelf

      - name: Install Qt (aqt)
        env:
          QT_AQT_MODULES: ${{ env.QT_MODULES }}
        run: bash packaging/linux/install_qt_aqt.sh

      - name: Configure
        run: |
          cmake --version
          QT_ROOT_DIR="$(cat .ci_qt_root)"
          echo "QT_ROOT_DIR=${QT_ROOT_DIR}"
          test -f "${QT_ROOT_DIR}/lib/cmake/Qt6/Qt6Config.cmake"
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQt6_DIR="${QT_ROOT_DIR}/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
