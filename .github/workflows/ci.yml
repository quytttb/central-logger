name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: "6.11.1"
  # qtsvg in Qt base; SerialBusâ†’serialport; Graphsâ†’quick3d; Qmlâ†’tasktree (aqt list-qt --modules 6.11.1 linux_gcc_64)
  QT_MODULES: qtserialbus qtserialport qtgraphs qttasktree qtquick3d qtshadertools

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt / OpenGL system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: ${{ env.QT_MODULES }}
          install-deps: false
          cache: false

      - name: Configure
        run: |
          QT_PREFIX="$(bash packaging/linux/resolve_qt_prefix.sh)"
          echo "Using Qt at ${QT_PREFIX}"
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="${QT_PREFIX}" \
            -DQt6_DIR="${QT_PREFIX}/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
