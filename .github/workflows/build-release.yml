name: Build Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: "6.11.1"
  QT_MODULES: qtserialbus qtserialport qtgraphs qttasktree qtquick3d qtshadertools

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag (need vMAJOR.MINOR.PATCH): ${TAG}" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "ref=refs/tags/${TAG}" >> "${GITHUB_OUTPUT}"

  build-deb:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Sync CMake project version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: python3 packaging/linux/sync_cmake_version.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.2.0"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            patchelf dpkg-dev

      - name: Install Qt (aqt)
        env:
          QT_AQT_MODULES: ${{ env.QT_MODULES }}
        run: bash packaging/linux/install_qt_aqt.sh

      - name: Build .deb
        run: |
          chmod +x packaging/linux/cpack_deb.sh
          packaging/linux/cpack_deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: deb-package
          path: dist/central-logger-app_${{ needs.prepare.outputs.version }}_amd64.deb
          if-no-files-found: error
          retention-days: 14

  build-exe:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Prefer Actions Python over WindowsApps stub
        shell: pwsh
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -and $_ -notmatch 'WindowsApps' }) -join ';'

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync CMake project version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: python packaging/linux/sync_cmake_version.py

      - name: Install Qt and MinGW (aqt)
        shell: pwsh
        env:
          QT_AQT_MODULES: ${{ env.QT_MODULES }}
        run: |
          & "${{ github.workspace }}/packaging/windows/install_qt_aqt.ps1"

      - name: Install Qt Installer Framework
        shell: pwsh
        run: |
          python -m pip install aqtinstall
          python -m aqt install-tool windows desktop tools_ifw -O "${{ github.workspace }}/Qt"

      - name: Configure and build Release
        shell: pwsh
        run: |
          $qt = "${{ env.QT_ROOT_DIR }}"
          if (-not $qt) { $qt = "$env:GITHUB_WORKSPACE\Qt\6.11.1\win64_mingw1310_64" }
          $env:Path = "$qt\bin;$env:Path"
          cmake -S . -B build-release-win -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$qt"
          cmake --build build-release-win -j

      - name: Build QTIFW installer
        shell: pwsh
        env:
          CL_PROJECT_ROOT: ${{ github.workspace }}
          CL_QT_DIR: ${{ env.QT_ROOT_DIR }}
          CL_BUILD_DIR: ${{ github.workspace }}/build-release-win
          CL_MINGW_DIR: ${{ github.workspace }}/Qt/Tools/mingw1310_64
          CL_IFW_DIR: ${{ github.workspace }}/Qt/Tools/QtInstallerFramework/4.11
        run: |
          $ifwAlt = Get-ChildItem -Path "${{ github.workspace }}/Qt/Tools" -Filter binarycreator.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ifwAlt) { $env:CL_IFW_DIR = $ifwAlt.Directory.Parent.Parent.FullName }
          & "${{ github.workspace }}/packaging/windows/build_installer.ps1"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: exe-package
          path: packaging/windows/installer_build/CentralLoggerSetup.exe
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [prepare, build-deb, build-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Central Logger ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          body: |
            ## Central Logger ${{ needs.prepare.outputs.version }}

            | Platform | File | Install |
            |----------|------|---------|
            | Ubuntu / Debian amd64 | `central-logger-app_*_amd64.deb` | `sudo apt install ./central-logger-app_*.deb` |
            | Windows x64 | `CentralLoggerSetup.exe` | Run the QTIFW offline installer |

            Built from tag `${{ needs.prepare.outputs.tag }}`.
          files: |
            release-assets/**/*.deb
            release-assets/**/CentralLoggerSetup.exe
